<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Easy Meals">
<meta name="theme-color" content="#FBF7EF">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FBF7EF; --paper-2:#F3ECDE; --ink:#2A1B26; --ink-soft:#6B5A63;
    --line:#E4D9C6; --basil:#3E7D4E; --basil-deep:#2F6A40; --tomato:#D2553C;
    --card-shadow:0 18px 40px -18px rgba(42,27,38,.45); --r:26px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    font-family:"Instrument Sans",system-ui,sans-serif;
    background:radial-gradient(120% 80% at 50% -10%, #FFFDF7 0%, var(--paper) 55%, var(--paper-2) 100%);
    color:var(--ink); display:flex; justify-content:center; min-height:100dvh; overflow:hidden;
  }
  .app{width:100%;max-width:440px;height:100dvh;display:flex;flex-direction:column;padding:0 16px;position:relative}

  header{padding:calc(18px + env(safe-area-inset-top)) 2px 10px;flex:0 0 auto;position:relative}
  .brand{display:flex;align-items:center;gap:9px;padding-right:170px}
  .brand .ic{width:30px;height:30px;flex:0 0 auto}
  .brand h1{font-family:"Bricolage Grotesque",sans-serif;font-weight:800;font-size:25px;letter-spacing:-.02em;margin:0;line-height:1}
  .brand .dot{color:var(--basil)}
  .tagline{font-size:12.5px;color:var(--ink-soft);margin:7px 2px 0;line-height:1.4}
  .count-line{font-size:12px;font-weight:600;color:var(--basil-deep);margin:6px 2px 0}
  .head-btns{position:absolute;top:calc(18px + env(safe-area-inset-top));right:0;display:flex;gap:6px}
  .hbtn{background:#fff;border:1.5px solid var(--line);cursor:pointer;color:var(--ink);

 tuz ve limon ekle."], "note": "Çıtır ve doyurucu; günü gününe."}, {"id": 49, "name": "Hurma + Ceviz", "emoji": "🌰", "cat": "snack", "time": "3 dk", "serv": "1", "keeps": "1 hafta", "tags": ["enerji", "tatlı"], "ing": ["4 hurma (datteri)", "4 ceviz içi"], "steps": ["Hurmaların çekirdeğini çıkar.", "Her birine bir ceviz içi yerleştir."], "note": "Doğal enerji bombası; 1 hafta dayanır."}, {"id": 50, "name": "Ton Balıklı Kraker", "emoji": "🐟", "cat": "snack", "time": "5 dk", "serv": "1", "keeps": "günü gününe", "tags": ["protein", "tuzlu"], "ing": ["4 kraker (crackers)", "yarım kutu ton balığı (süzülmüş)", "4 pomodorini", "bir fiske karabiber"], "steps": ["Ton balığını krakerlerin üstüne koy.", "Domates ve karabiberle bitir."], "note": "Proteinli atıştırmalık; günü gününe."}];
const CATS = {
  all:      {label:"Hepsi",        c1:"#3E7D4E", c2:"#2F6A40", chip:"Hepsi"},
  breakfast:{label:"Kahvaltı",     c1:"#FFCF4D", c2:"#F2A93B", chip:"☀️ Kahvaltı"},
  lunch:    {label:"Öğle & Akşam", c1:"#8BC34A", c2:"#4E9A4E", chip:"🥗 Öğle & Akşam"},
  snack:    {label:"Atıştırmalık", c1:"#F2A98F", c2:"#E07A6E", chip:"🍓 Atıştırmalık"},
};

/* ---------- persistence ---------- */
const KEY="myeasymeals_v2";
let mem=null;
function saveState(){
  const s={filter,deck,saved,checked:checkedToObj(),lastView};
  try{ localStorage.setItem(KEY, JSON.stringify(s)); }catch(e){ mem=s; }
}
function readState(){
  try{ const v=localStorage.getItem(KEY); if(v) return JSON.parse(v); }catch(e){}
  return mem;
}
function checkedToObj(){ const o={}; for(const k in checked){ o[k]=[...checked[k]]; } return o; }

/* ---------- state ---------- */
let filter="all", deck=[], saved=[], lastView=null;
const checked={};

const $=s=>document.querySelector(s);
const deckEl=$("#deck"), emptyEl=$("#empty");
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
function byId(id){return RECIPES.find(r=>r.id===id);}
function poolIds(){return RECIPES.filter(r=>filter==="all"||r.cat===filter).map(r=>r.id);}

function buildDeck(){
  // remaining = pool minus already-saved (saved ones go to list, not deck)
  deck = shuffle(poolIds().filter(id=>!saved.includes(id)));
  render(); updateUndo(); saveState();
}

function render(){
  deckEl.innerHTML="";
  const top3=deck.slice(0,3).reverse();
  top3.forEach((id,idx)=>{
    const r=byId(id), isTop=idx===top3.length-1, depth=top3.length-1-idx, cat=CATS[r.cat];
    const card=document.createElement("div");
    card.className="card"; card.dataset.id=id;
    card.style.transform=`translateY(${depth*10}px) scale(${1-depth*0.04})`;
    card.style.zIndex=idx;
    card.innerHTML=`
      <div class="hero" style="background:linear-gradient(150deg,${cat.c1},${cat.c2})">
        <span class="cat-tag">${cat.chip}</span>
        <span class="glyph">${r.emoji}</span>
        <span class="keeps">🗓️ ${r.keeps}</span>
        <div class="stamp like">Beğen</div>
        <div class="stamp nope">Geç</div>
        <div class="tint"></div>
      </div>
      <div class="body">
        <h2>${r.name}</h2>
        <div class="meta"><span>⏱️ ${r.time}</span><span>🍽️ ${r.serv} kişi</span><span>🛒 ${r.ing.length} malzeme</span></div>
        <div class="taglist">${r.tags.map(t=>`<span class="t">${t}</span>`).join("")}</div>
        <div class="hint">↔️ Kaydır ya da aşağıdaki düğmeleri kullan</div>
      </div>`;
    deckEl.appendChild(card);
    if(isTop) attachDrag(card);
  });
  emptyEl.classList.toggle("show", deck.length===0);
  const total=poolIds().length;
  $("#counter").textContent = deck.length
    ? `Sırada ${deck.length} tarif · ♥ ${saved.length} listende`
    : `Bu seçimdekilerin hepsi listende 🎉`;
}

function attachDrag(card){
  let sx=0,sy=0,dx=0,dy=0,drag=false;
  const like=card.querySelector(".stamp.like"), nope=card.querySelector(".stamp.nope"), tint=card.querySelector(".tint");
  const down=e=>{drag=true;const p=e.touches?e.touches[0]:e;sx=p.clientX;sy=p.clientY;card.style.transition="none";};
  const move=e=>{
    if(!drag)return;const p=e.touches?e.touches[0]:e;dx=p.clientX-sx;dy=p.clientY-sy;
    card.style.transform=`translate(${dx}px,${dy}px) rotate(${dx/18}deg)`;
    const t=Math.min(Math.abs(dx)/120,1);
    like.style.opacity=dx>0?t:0; nope.style.opacity=dx<0?t:0;
    tint.style.background=dx>0?"var(--basil)":"var(--tomato)"; tint.style.opacity=t*0.32;
  };
  const up=()=>{
    if(!drag)return;drag=false;card.style.transition="transform .34s cubic-bezier(.22,1,.36,1)";
    if(dx>110) fly(card,1); else if(dx<-110) fly(card,-1);
    else{card.style.transform="";like.style.opacity=0;nope.style.opacity=0;tint.style.opacity=0;}
    dx=0;dy=0;
  };
  card.addEventListener("mousedown",down);
  window.addEventListener("mousemove",move); window.addEventListener("mouseup",up);
  card.addEventListener("touchstart",down,{passive:true});
  card.addEventListener("touchmove",move,{passive:true});
  card.addEventListener("touchend",up);
}

function fly(card,dir){
  const id=+card.dataset.id;
  card.style.transform=`translate(${dir*620}px,${dir>0?-60:-40}px) rotate(${dir*30}deg)`;
  card.style.opacity="0";
  setTimeout(()=>{
    deck=deck.filter(x=>x!==id);
    if(dir>0){ match(id); }
    else { deck.push(id); }   // PASS -> go to end, don't lose it
    render(); updateUndo(); saveState();
  },240);
}

function topCard(){const c=deckEl.querySelectorAll(".card");return c[c.length-1];}
$("#passBtn").onclick=()=>{const c=topCard();if(c){c.style.transition="transform .34s cubic-bezier(.22,1,.36,1)";fly(c,-1);}};
$("#likeBtn").onclick=()=>{const c=topCard();if(c){c.style.transition="transform .34s cubic-bezier(.22,1,.36,1)";fly(c,1);}};
$("#undoBtn").onclick=()=>{ /* undo only meaningful for pass; matched stays in list */
  // find last passed id = last element of deck that was just pushed
  if(!deck.length) return;
  const id=deck.pop(); deck.unshift(id); render(); updateUndo(); saveState();
};
function updateUndo(){ $("#undoBtn").disabled = deck.length<2; }

/* ---------- match ---------- */
function match(id){
  if(!saved.includes(id)){ saved.unshift(id); }
  updateBadge(); saveState();
  openRecipe(id,true);
}
function updateBadge(){const b=$("#savedBadge");if(saved.length){b.style.display="inline-flex";b.textContent=saved.length;}else b.style.display="none";}

/* ---------- sheet ---------- */
const scrim=$("#scrim"), sheet=$("#sheet"), sc=$("#sheetContent");
function openSheet(){scrim.classList.add("open");sheet.classList.add("open");}
function closeSheet(){scrim.classList.remove("open");sheet.classList.remove("open");lastView=null;saveState();}
scrim.onclick=closeSheet;

function openRecipe(id,fromMatch){
  const r=byId(id),cat=CATS[r.cat];
  if(!checked[id]) checked[id]=new Set();
  lastView={t:"recipe",id}; saveState();
  const ings=r.ing.map((it,i)=>`<li class="${checked[id].has(i)?"done":""}" data-i="${i}">
      <span class="box"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></span>
      <span>${it}</span></li>`).join("");
  const steps=r.steps.map(s=>`<li>${s}</li>`).join("");
  sc.innerHTML=`
    <div class="sheet-head">
      <button class="x" id="xBtn" aria-label="Kapat">✕</button>
      <span class="s-cat" style="background:linear-gradient(135deg,${cat.c1},${cat.c2})">${r.emoji} ${cat.label}</span>
      <h2>${r.name}</h2>
      <div class="s-meta"><span>⏱️ ${r.time}</span><span>🍽️ ${r.serv} kişi</span><span>🗓️ ${r.keeps}</span></div>
    </div>
    <div class="sheet-body">
      <div class="sec-label">🛒 Malzemeler<span class="meas" id="measLink">ℹ️ ölçüler</span></div>
      <ul class="ing" id="ingList">${ings}</ul>
      <div class="sec-label">🥄 Hazırlanışı</div>
      <ol class="steps">${steps}</ol>
      <div class="note">💡<div><b>İpucu:</b> ${r.note}</div></div>
      <button class="save-img" id="saveImg">📥 Tarifi telefona kaydet</button>
      ${fromMatch?'<p class="stay-tag">Listene eklendi 💚 Bu tarif sen kapatana kadar burada durur.</p>':'<p class="stay-tag">Listende kayıtlı 💚</p>'}
    </div>`;
  $("#xBtn").onclick=closeSheet;
  $("#measLink").onclick=openGuide;
  $("#saveImg").onclick=()=>downloadImage(r);
  sc.querySelectorAll("#ingList li").forEach(li=>{
    li.onclick=()=>{const i=+li.dataset.i;
      if(checked[id].has(i)){checked[id].delete(i);li.classList.remove("done");}
      else{checked[id].add(i);li.classList.add("done");}
      saveState();};
  });
  openSheet();
}

/* ---------- saved list ---------- */
$("#openSaved").onclick=openSaved;
function openSaved(){
  lastView={t:"list"}; saveState();
  const rows=saved.map(id=>{const r=byId(id),cat=CATS[r.cat];
    return `<div class="srow" data-id="${id}"><span class="sg">${r.emoji}</span>
      <div class="si"><h4>${r.name}</h4><p>${cat.label} · ⏱️ ${r.time} · 🗓️ ${r.keeps}</p></div>
      <button class="rm" data-rm="${id}" aria-label="Çıkar">✕</button></div>`;}).join("");
  sc.innerHTML=`
    <div class="sheet-head"><button class="x" id="xBtn">✕</button>
      <span class="s-cat" style="background:linear-gradient(135deg,#3E7D4E,#2F6A40)">🍳 Mutfak listem</span>
      <h2>Beğendiğin tarifler</h2><div class="s-meta"><span>${saved.length} tarif kayıtlı</span></div></div>
    <div class="sheet-body">${saved.length?`<div class="saved-list">${rows}</div>`
      :`<div class="list-empty"><div class="le-g">🥣</div>Henüz tarif beğenmedin.<br>Sağa kaydırdığın tarifler buraya düşer.</div>`}</div>`;
  $("#xBtn").onclick=closeSheet;
  sc.querySelectorAll(".srow").forEach(row=>{row.onclick=e=>{if(e.target.dataset.rm!==undefined)return;openRecipe(+row.dataset.id,false);};});
  sc.querySelectorAll("[data-rm]").forEach(b=>{b.onclick=e=>{e.stopPropagation();const id=+b.getAttribute("data-rm");
    saved=saved.filter(x=>x!==id);updateBadge();saveState();b.closest(".srow").remove();
    if(poolIds().includes(id)&&!deck.includes(id)){deck.push(id);} render();};});
  openSheet();
}

$("#openGuide").onclick=openGuide;

  lastView={t:"guide"}; saveState();
  sc.innerHTML=`
    <div class="sheet-head"><button class="x" id="xBtn">✕</button>
      <span class="s-cat" style="background:linear-gradient(135deg,#3E7D4E,#2F6A40)">📏 Ölçü rehberi</span>
      <h2>Kaşık kaşık ne demek?</h2></div>
    <div class="sheet-body guide">

        <tr><td>1 çk</td><td>1 çay kaşığı (küçük kaşık) ≈ 5 ml</td></tr>
        <tr><td>1 fiske</td><td>iki parmak ucuyla aldığın minik miktar (tuz, tarçın için)</td></tr>
        <tr><td>1 avuç</td><td>bir avuç dolusu ≈ 30 g (kuruyemiş, meyve)</td></tr>
        <tr><td>1 demet</td><td>bir bağ taze ot (maydanoz, nane)</td></tr>
        <tr><td>1 dilim</td><td>bıçakla kestiğin bir parça (ekmek, domates)</td></tr>
        <tr><td>1 kutu</td><td>standart konserve ≈ 240 g süzülmüş (fasulye, nohut)</td></tr>
      </table>
      <p style="margin-top:16px;color:var(--basil-deep)"><b>Altın kural:</b> tuzu az koy, karıştır, tadına bak, gerekirse ekle. Geri alamazsın ama ekleyebilirsin 🙂</p>
    </div>`;
  $("#xBtn").onclick=closeSheet;
  openSheet();
}

/* ---------- download recipe as image ---------- */
function toast(msg){const t=$("#toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),3200);}
async function downloadImage(r){
  try{ if(document.fonts&&document.fonts.ready) await document.fonts.ready; }catch(e){}
  const cat=CATS[r.cat];
  const S=2, W=720, PAD=48;
  const head=(f,s)=>`${s}px "${f}",sans-serif`;
  // measure
  const meas=document.createElement("canvas").getContext("2d");
  function wrap(ctx,text,font,maxw){ctx.font=font;const words=text.split(" ");let line="",lines=[];
    for(const w of words){const test=line?line+" "+w:w;if(ctx.measureText(test).width>maxw&&line){lines.push(line);line=w;}else line=test;}
    if(line)lines.push(line);return lines;}
  const innerW=W-PAD*2;
  let y=0; const blocks=[];
  // header band
  blocks.push({type:"band"}); y=170;
  // title
  const tl=wrap(meas,r.name,head("Bricolage Grotesque",34),innerW); blocks.push({type:"title",lines:tl}); y+=tl.length*42+8;
  // meta
  blocks.push({type:"meta"}); y+=34;
  // ingredients label + items
  blocks.push({type:"label",text:"🛒 Malzemeler"}); y+=42;
  const ingLines=r.ing.map(it=>wrap(meas,"•  "+it,head("Instrument Sans",20),innerW-10));
  ingLines.forEach(ls=>{blocks.push({type:"li",lines:ls});y+=ls.length*30+6;});
  // steps label + items
  blocks.push({type:"label",text:"🥄 Hazırlanışı"}); y+=42;
  const stepLines=r.steps.map((s,i)=>wrap(meas,(i+1)+".  "+s,head("Instrument Sans",20),innerW-10));
  stepLines.forEach(ls=>{blocks.push({type:"li",lines:ls});y+=ls.length*30+10;});
  // note
  const noteLines=wrap(meas,"💡 "+r.note,head("Instrument Sans",18),innerW-32);
  blocks.push({type:"note",lines:noteLines}); y+=noteLines.length*26+40;
  // footer
  y+=46;
  const H=y+PAD;

  const c=document.createElement("canvas"); c.width=W*S; c.height=H*S;
  const x=c.getContext("2d"); x.scale(S,S);
  x.fillStyle="#FBF7EF"; x.fillRect(0,0,W,H);
  let cy=0;
  for(const b of blocks){
    if(b.type==="band"){
      const g=x.createLinearGradient(0,0,W,150); g.addColorStop(0,cat.c1); g.addColorStop(1,cat.c2);
      x.fillStyle=g; x.fillRect(0,0,W,150);
      x.font="64px sans-serif"; x.textAlign="left"; x.fillText(r.emoji,PAD,98);
      x.fillStyle="rgba(255,255,255,.95)"; x.font=head("Instrument Sans",22);
      x.fillText(cat.label.toUpperCase(),PAD+96,70);
      x.fillStyle="#fff"; x.font=head("Instrument Sans",18);
      x.fillText("⏱️ "+r.time+"   🍽️ "+r.serv+" kişi   🗓️ "+r.keeps, PAD+96, 100);
      cy=170;
    } else if(b.type==="title"){
      x.fillStyle="#2A1B26"; x.font=head("Bricolage Grotesque",34); x.textAlign="left";
      b.lines.forEach(l=>{x.fillText(l,PAD,cy+30);cy+=42;}); cy+=8;
    } else if(b.type==="meta"){ cy+=34; }
    else if(b.type==="label"){
      x.fillStyle="#3E7D4E"; x.font=head("Bricolage Grotesque",22); x.fillText(b.text,PAD,cy+22); cy+=42;
    } else if(b.type==="li"){
      x.fillStyle="#2A1B26"; x.font=head("Instrument Sans",20);
      b.lines.forEach((l,i)=>{x.fillText(i===0?l:"     "+l,PAD,cy+20);cy+=30;}); cy+=(b===blocks.find(z=>z===b)&& false)?0:0;
      cy+=6;
    } else if(b.type==="note"){
      cy+=14; const nh=b.lines.length*26+24;
      x.fillStyle="rgba(62,125,78,.10)"; roundRect(x,PAD-12,cy-8,innerW+24,nh,14); x.fill();
      x.fillStyle="#2F6A40"; x.font=head("Instrument Sans",18);
      b.lines.forEach(l=>{x.fillText(l,PAD,cy+16);cy+=26;}); cy+=24;
    }
  }
  // footer
  x.textAlign="center"; x.fillStyle="#6B5A63"; x.font=head("Bricolage Grotesque",22);
  x.fillText("🥣 My Easy Meals",W/2,H-PAD+10);

  function roundRect(ctx,x0,y0,w,h,rr){ctx.beginPath();ctx.moveTo(x0+rr,y0);ctx.arcTo(x0+w,y0,x0+w,y0+h,rr);
    ctx.arcTo(x0+w,y0+h,x0,y0+h,rr);ctx.arcTo(x0,y0+h,x0,y0,rr);ctx.arcTo(x0,y0,x0+w,y0,rr);ctx.closePath();}

  const name=r.name.replace(/[^a-zA-Z0-9ğüşıöçĞÜŞİÖÇ ]/g,"").trim().replace(/\s+/g,"_");
  c.toBlob(blob=>{
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url; a.download="MyEasyMeals_"+name+".jpg";
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),4000);
    toast("Resim indirildi. iPhone'da açılırsa basılı tut → Fotoğraflara Ekle 📸");
  },"image/jpeg",0.95);
}

/* ---------- chips ---------- */
function buildChips(){
  const wrap=$("#chips");wrap.innerHTML="";
  Object.keys(CATS).forEach(k=>{
    const c=document.createElement("button");
    c.className="chip"+(k===filter?" on":"");
    c.textContent=CATS[k].chip;
    c.onclick=()=>{filter=k;buildChips();buildDeck();};
    wrap.appendChild(c);
  });
}
$("#reshuffle").onclick=()=>{ // re-show everything in this filter, even matched
  deck=shuffle(poolIds()); render(); updateUndo(); saveState();
};

window.addEventListener("keydown",e=>{
  if(sheet.classList.contains("open")){if(e.key==="Escape")closeSheet();return;}
  if(e.key==="ArrowRight")$("#likeBtn").click();
  if(e.key==="ArrowLeft")$("#passBtn").click();
});

/* ---------- init / restore ---------- */
(function init(){
  const s=readState();
  if(s){
    filter=s.filter||"all";
    saved=Array.isArray(s.saved)?s.saved:[];
    if(s.checked){for(const k in s.checked){checked[k]=new Set(s.checked[k]);}}
    deck=Array.isArray(s.deck)&&s.deck.length?s.deck.filter(id=>poolIds().includes(id)):shuffle(poolIds().filter(id=>!saved.includes(id)));
    lastView=s.lastView||null;
    buildChips(); render(); updateUndo(); updateBadge();
    // resume the view she left open
    if(lastView){
      if(lastView.t==="recipe"&&byId(lastView.id)) openRecipe(lastView.id,false);
      else if(lastView.t==="list") openSaved();
      else if(lastView.t==="guide") openGuide();
    }
  } else {
    buildChips(); buildDeck(); updateBadge();
  }
})();
</script>
