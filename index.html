<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>My Easy Meals</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FBF7EF;
    --paper-2:#F3ECDE;
    --ink:#2A1B26;
    --ink-soft:#6B5A63;
    --line:#E4D9C6;
    --basil:#3E7D4E;
    --basil-deep:#2F6A40;
    --tomato:#D2553C;
    --card-shadow:0 18px 40px -18px rgba(42,27,38,.45);
    --r:26px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    font-family:"Instrument Sans",system-ui,sans-serif;
    background:
      radial-gradient(120% 80% at 50% -10%, #FFFDF7 0%, var(--paper) 55%, var(--paper-2) 100%);
    color:var(--ink);
    display:flex;justify-content:center;
    min-height:100dvh;
    overflow:hidden;
  }
  .app{
    width:100%;max-width:440px;height:100dvh;
    display:flex;flex-direction:column;
    padding:0 16px;position:relative;
  }

  /* ---------- header ---------- */
  header{padding:20px 2px 12px;flex:0 0 auto;position:relative}
  .brand{display:flex;align-items:baseline;gap:9px;padding-right:78px}
  .brand h1{
    font-family:"Bricolage Grotesque",sans-serif;
    font-weight:800;font-size:27px;letter-spacing:-.02em;
    margin:0;line-height:1;
  }
  .brand .dot{color:var(--basil)}
  .tagline{font-size:13px;color:var(--ink-soft);margin:7px 2px 0;line-height:1.4}
  .count-line{font-size:12px;font-weight:600;color:var(--basil-deep);margin:7px 2px 0}

  /* ---------- filter chips ---------- */
  .chips{
    display:flex;gap:7px;overflow-x:auto;padding:14px 2px 4px;
    scrollbar-width:none;-ms-overflow-style:none;flex:0 0 auto;
  }
  .chips::-webkit-scrollbar{display:none}
  .chip{
    flex:0 0 auto;border:1.5px solid var(--line);background:#fff;
    color:var(--ink);font-family:inherit;font-size:13px;font-weight:600;
    padding:7px 13px;border-radius:999px;cursor:pointer;white-space:nowrap;
    transition:transform .12s ease, background .15s, border-color .15s, color .15s;
  }
  .chip:hover{transform:translateY(-1px)}
  .chip.on{background:var(--ink);border-color:var(--ink);color:var(--paper)}

  /* ---------- deck ---------- */
  .deck-wrap{flex:1 1 auto;position:relative;display:flex;align-items:center;justify-content:center;margin:8px 0}
  .deck{position:relative;width:100%;height:100%;max-height:560px}

  .card{
    position:absolute;inset:0;border-radius:var(--r);
    background:#fff;box-shadow:var(--card-shadow);
    border:1px solid rgba(42,27,38,.06);
    overflow:hidden;display:flex;flex-direction:column;
    transform-origin:center bottom;
    will-change:transform;touch-action:none;cursor:grab;
    user-select:none;
  }
  .card:active{cursor:grabbing}
  .card .hero{
    position:relative;height:48%;flex:0 0 48%;
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;
  }
  .card .hero .glyph{font-size:108px;filter:drop-shadow(0 8px 16px rgba(0,0,0,.18));transform:rotate(-6deg)}
  .card .hero .cat-tag{
    position:absolute;top:14px;left:14px;
    background:rgba(255,255,255,.92);backdrop-filter:blur(4px);
    font-size:11.5px;font-weight:700;letter-spacing:.02em;
    padding:5px 11px;border-radius:999px;color:var(--ink);
  }
  .card .hero .keeps{
    position:absolute;bottom:14px;right:14px;
    background:rgba(42,27,38,.78);color:#fff;
    font-size:11px;font-weight:600;padding:5px 10px;border-radius:999px;
    display:flex;align-items:center;gap:5px;
  }
  .card .body{padding:18px 20px 16px;flex:1 1 auto;display:flex;flex-direction:column}
  .card .body h2{
    font-family:"Bricolage Grotesque",sans-serif;font-weight:700;
    font-size:22px;line-height:1.12;letter-spacing:-.015em;margin:0 0 10px;
  }
  .meta{display:flex;gap:14px;color:var(--ink-soft);font-size:13px;font-weight:600;margin-bottom:12px}
  .meta span{display:flex;align-items:center;gap:5px}
  .taglist{display:flex;gap:6px;flex-wrap:wrap;margin-top:auto}
  .taglist .t{
    font-size:11.5px;font-weight:600;color:var(--basil-deep);
    background:rgba(62,125,78,.1);padding:4px 10px;border-radius:999px;
  }
  .hint{font-size:12px;color:var(--ink-soft);margin-top:13px;display:flex;align-items:center;gap:6px;opacity:.85}

  /* swipe stamps */
  .stamp{
    position:absolute;top:26px;font-family:"Bricolage Grotesque",sans-serif;
    font-weight:800;font-size:30px;letter-spacing:.04em;padding:6px 16px;
    border:4px solid;border-radius:14px;opacity:0;pointer-events:none;
    transition:opacity .05s;text-transform:uppercase;
  }
  .stamp.like{right:22px;color:var(--basil);border-color:var(--basil);transform:rotate(14deg)}
  .stamp.nope{left:22px;color:var(--tomato);border-color:var(--tomato);transform:rotate(-14deg)}

  /* ---------- action buttons ---------- */
  .actions{flex:0 0 auto;display:flex;align-items:center;justify-content:center;gap:18px;padding:10px 0 calc(14px + env(safe-area-inset-bottom))}
  .act{
    border:none;cursor:pointer;border-radius:50%;background:#fff;
    box-shadow:0 8px 20px -8px rgba(42,27,38,.4);
    display:flex;align-items:center;justify-content:center;
    transition:transform .14s ease, box-shadow .14s;
  }
  .act:hover{transform:translateY(-3px)}
  .act:active{transform:scale(.92)}
  .act svg{width:26px;height:26px}
  .act.pass{width:58px;height:58px;color:var(--tomato)}
  .act.like{width:70px;height:70px;color:#fff;background:var(--basil)}
  .act.like svg{width:32px;height:32px}
  .act.undo{width:46px;height:46px;color:var(--ink-soft)}
  .act.undo svg{width:20px;height:20px}
  .act:disabled{opacity:.35;cursor:default;transform:none}

  /* ---------- saved tab button ---------- */
  .saved-fab{
    position:absolute;top:22px;right:0;background:none;border:none;cursor:pointer;
    color:var(--ink);display:flex;align-items:center;gap:5px;font-family:inherit;
    font-weight:700;font-size:13px;padding:6px;
  }
  .saved-fab .badge{
    background:var(--tomato);color:#fff;font-size:11px;min-width:18px;height:18px;
    border-radius:999px;display:inline-flex;align-items:center;justify-content:center;padding:0 4px;
  }

  /* ---------- empty state ---------- */
  .empty{
    position:absolute;inset:0;display:none;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;padding:30px;
    border-radius:var(--r);border:2px dashed var(--line);background:rgba(255,255,255,.5);
  }
  .empty.show{display:flex}
  .empty .em-glyph{font-size:60px;margin-bottom:14px}
  .empty h3{font-family:"Bricolage Grotesque",sans-serif;font-size:21px;margin:0 0 6px}
  .empty p{color:var(--ink-soft);font-size:14px;margin:0 0 20px;max-width:240px;line-height:1.45}

  .btn{
    font-family:inherit;font-weight:700;font-size:14px;cursor:pointer;
    border:none;border-radius:999px;padding:12px 24px;background:var(--ink);color:var(--paper);
    transition:transform .12s;
  }
  .btn:hover{transform:translateY(-2px)}
  .btn.ghost{background:#fff;color:var(--ink);border:1.5px solid var(--line)}

  /* ---------- modal (recipe + list) ---------- */
  .scrim{
    position:fixed;inset:0;background:rgba(33,20,28,.5);backdrop-filter:blur(3px);
    opacity:0;pointer-events:none;transition:opacity .25s;z-index:40;
  }
  .scrim.open{opacity:1;pointer-events:auto}
  .sheet{
    position:fixed;left:50%;bottom:0;transform:translate(-50%,100%);
    width:100%;max-width:440px;max-height:92dvh;background:var(--paper);
    border-radius:26px 26px 0 0;z-index:50;transition:transform .32s cubic-bezier(.22,1,.36,1);
    display:flex;flex-direction:column;overflow:hidden;box-shadow:0 -10px 50px -10px rgba(0,0,0,.4);
  }
  .sheet.open{transform:translate(-50%,0)}
  .sheet .grab{width:42px;height:5px;border-radius:999px;background:var(--line);margin:10px auto 0;flex:0 0 auto}
  .sheet-head{position:relative;padding:18px 22px 14px;flex:0 0 auto}
  .sheet-head .s-cat{font-size:11.5px;font-weight:700;color:#fff;padding:5px 11px;border-radius:999px;display:inline-flex;align-items:center;gap:6px}
  .sheet-head h2{font-family:"Bricolage Grotesque",sans-serif;font-weight:800;font-size:25px;line-height:1.1;letter-spacing:-.02em;margin:11px 0 12px}
  .sheet-head .s-meta{display:flex;gap:16px;color:var(--ink-soft);font-size:13.5px;font-weight:600;flex-wrap:wrap}
  .sheet-head .s-meta span{display:flex;align-items:center;gap:6px}
  .x{position:absolute;top:14px;right:16px;width:36px;height:36px;border-radius:50%;border:none;background:#fff;
     box-shadow:0 4px 12px -4px rgba(0,0,0,.3);cursor:pointer;font-size:18px;color:var(--ink);display:flex;align-items:center;justify-content:center}
  .sheet-body{overflow-y:auto;padding:4px 22px 26px;flex:1 1 auto;-webkit-overflow-scrolling:touch}
  .sec-label{font-family:"Bricolage Grotesque",sans-serif;font-weight:700;font-size:15px;
     margin:20px 0 11px;display:flex;align-items:center;gap:8px}
  .sec-label::after{content:"";flex:1;height:1.5px;background:var(--line)}
  ul.ing{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:2px}
  ul.ing li{display:flex;align-items:flex-start;gap:11px;padding:9px 4px;border-bottom:1px solid var(--line);
     font-size:14.5px;line-height:1.35;cursor:pointer}
  ul.ing li:last-child{border-bottom:none}
  ul.ing .box{flex:0 0 auto;width:21px;height:21px;border-radius:6px;border:2px solid var(--line);margin-top:1px;
     display:flex;align-items:center;justify-content:center;transition:.15s}
  ul.ing li.done .box{background:var(--basil);border-color:var(--basil)}
  ul.ing li.done .box svg{opacity:1}
  ul.ing .box svg{width:13px;height:13px;color:#fff;opacity:0;transition:.15s}
  ul.ing li.done span{color:var(--ink-soft);text-decoration:line-through}
  ol.steps{margin:0;padding:0;list-style:none;counter-reset:s;display:flex;flex-direction:column;gap:12px}
  ol.steps li{counter-increment:s;display:flex;gap:13px;font-size:14.5px;line-height:1.45}
  ol.steps li::before{content:counter(s);flex:0 0 auto;width:27px;height:27px;border-radius:50%;
     background:var(--ink);color:var(--paper);font-family:"Bricolage Grotesque",sans-serif;font-weight:700;
     font-size:14px;display:flex;align-items:center;justify-content:center}
  .note{margin-top:22px;background:rgba(62,125,78,.09);border-radius:16px;padding:14px 16px;
     font-size:13.5px;line-height:1.5;color:var(--basil-deep);display:flex;gap:10px;align-items:flex-start}
  .note b{color:var(--basil-deep)}
  .stay-tag{margin:14px 0 0;font-size:12px;color:var(--ink-soft);text-align:center}

  /* list view */
  .list-empty{text-align:center;padding:50px 20px;color:var(--ink-soft)}
  .list-empty .le-g{font-size:50px;margin-bottom:12px}
  .saved-list{display:flex;flex-direction:column;gap:10px}
  .srow{display:flex;align-items:center;gap:13px;background:#fff;border-radius:16px;padding:11px 14px;
     border:1px solid var(--line);cursor:pointer;transition:transform .12s}
  .srow:hover{transform:translateX(3px)}
  .srow .sg{font-size:30px;flex:0 0 auto}
  .srow .si{flex:1 1 auto;min-width:0}
  .srow .si h4{font-family:"Bricolage Grotesque",sans-serif;font-weight:700;font-size:15px;margin:0 0 2px;
     white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .srow .si p{margin:0;font-size:12px;color:var(--ink-soft)}
  .srow .rm{flex:0 0 auto;border:none;background:none;cursor:pointer;color:var(--ink-soft);padding:6px;font-size:18px}
  .srow .rm:hover{color:var(--tomato)}

  @media (prefers-reduced-motion: reduce){
    *{transition:none!important}
  }
  @media (max-height:680px){
    .card .hero .glyph{font-size:84px}
    .deck{max-height:480px}
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand">
      <h1>My Easy Meals<span class="dot">.</span></h1>
    </div>
    <p class="tagline">Sağa kaydır, eşleş, tarifi al. Hepsi hızlı, doyurucu ve Cenova marketlerinden.</p>
    <div class="count-line" id="counter"></div>
    <button class="saved-fab" id="openSaved" aria-label="Mutfak listem">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      Listem<span class="badge" id="savedBadge" style="display:none">0</span>
    </button>
  </header>

  <div class="chips" id="chips"></div>

  <div class="deck-wrap">
    <div class="deck" id="deck"></div>
    <div class="empty" id="empty">
      <div class="em-glyph">🍽️</div>
      <h3>Hepsini gördün!</h3>
      <p>Bu seçimdeki tüm tarifleri elemiş oldun. Desteyi karıştırıp baştan bakabilirsin.</p>
      <button class="btn" id="reshuffle">Desteyi karıştır</button>
    </div>
  </div>

  <div class="actions">
    <button class="act undo" id="undoBtn" aria-label="Geri al" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M3 13a9 9 0 1 0 3-7.7L3 9"/></svg>
    </button>
    <button class="act pass" id="passBtn" aria-label="Geç">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
    </button>
    <button class="act like" id="likeBtn" aria-label="Eşleş">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7.5-4.9-10-9.3C.4 8.7 2 5 5.4 5c2 0 3.4 1.2 4.1 2.4C10.2 6.2 11.6 5 13.6 5 17 5 18.6 8.7 17 11.7 14.5 16.1 12 21 12 21z"/></svg>
    </button>
  </div>
</div>

<!-- recipe / list sheet -->
<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet" role="dialog" aria-modal="true">
  <div class="grab"></div>
  <div id="sheetContent"></div>
</div>

<script>

  pasta:    {label:"Makarna & Pilav", c1:"#F2B441", c2:"#E8862E"},
  legume:   {label:"Bakliyat",        c1:"#E07A3E", c2:"#C24B2E"},
  egg:      {label:"Yumurta",         c1:"#FFCF4D", c2:"#F2A93B"},
  chicken:  {label:"Tavuk",           c1:"#E8825A", c2:"#D85436"},
  soup:     {label:"Çorba",           c1:"#7FA86B", c2:"#4F7B3E"},
  salad:    {label:"Salata & Kase",   c1:"#8BC34A", c2:"#4E9A4E"},
  oven:     {label:"Fırın & Tepsi",   c1:"#D98A3D", c2:"#A85A2A"},
  breakfast:{label:"Kahvaltı",        c1:"#F2A98F", c2:"#E07A6E"},
  veggie:   {label:"Sebze",           c1:"#6FB04A", c2:"#3E8A3E"},
  fish:     {label:"Deniz",           c1:"#4FB0A8", c2:"#2E7D8A"},
};

/* ---------- persistence (graceful) ---------- */
const SKEY = "myeasymeals_saved_v1";
function loadSaved(){ try{ return JSON.parse(localStorage.getItem(SKEY)) || []; }catch(e){ return mem; } }
function storeSaved(a){ try{ localStorage.setItem(SKEY, JSON.stringify(a)); }catch(e){ mem = a; } }
let mem = [];
let saved = loadSaved();

/* ---------- state ---------- */
let filter = "all";
let deck = [];       // remaining recipe ids in current run
let history = [];    // [{id, action}]
const checked = {};  // recipe id -> Set of ingredient indices

const $ = s => document.querySelector(s);
const deckEl = $("#deck"), emptyEl = $("#empty");

function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];} return a; }

function buildDeck(){
  const pool = RECIPES.filter(r => filter==="all" || r.cat===filter);
  deck = shuffle(pool.map(r=>r.id));
  history = [];
  render();
  updateUndo();
}

function byId(id){ return RECIPES.find(r=>r.id===id); }

/* ---------- card rendering ---------- */
function render(){
  deckEl.innerHTML = "";
  const top3 = deck.slice(0,3).reverse(); // last in array = top card
  top3.forEach((id, idx) => {
    const r = byId(id);
    const isTop = idx === top3.length-1;
    const depth = top3.length-1-idx;
    const cat = CATS[r.cat];
    const card = document.createElement("div");
    card.className = "card";
    card.dataset.id = id;
    card.style.transform = `translateY(${depth*10}px) scale(${1-depth*0.04})`;
    card.style.zIndex = idx;
    card.innerHTML = `
      <div class="hero" style="background:linear-gradient(150deg,${cat.c1},${cat.c2})">
        <span class="cat-tag">${cat.label}</span>
        <span class="glyph">${r.emoji}</span>
        <span class="keeps">🗓️ ${r.keeps} taze</span>
        <div class="stamp like">Eşleş</div>
        <div class="stamp nope">Geç</div>
      </div>
      <div class="body">
        <h2>${r.name}</h2>
        <div class="meta">
          <span>⏱️ ${r.time}</span>
          <span>🍽️ ${r.serv} kişi</span>
          <span>📋 ${r.ing.length} malzeme</span>
        </div>
        <div class="taglist">${r.tags.map(t=>`<span class="t">${t}</span>`).join("")}</div>
        <div class="hint">↔️ Kaydır ya da aşağıdaki düğmeleri kullan</div>
      </div>`;
    deckEl.appendChild(card);
    if(isTop) attachDrag(card);
  });
  emptyEl.classList.toggle("show", deck.length===0);
  const total = RECIPES.filter(r => filter==="all" || r.cat===filter).length;
  $("#counter").textContent = deck.length
    ? `${total} tarif arasından · ${deck.length} kaldı`
    : `${total} tarifi de gördün`;
}

/* ---------- drag / swipe ---------- */
function attachDrag(card){
  let startX=0, startY=0, dx=0, dy=0, dragging=false;
  const like = card.querySelector(".stamp.like");
  const nope = card.querySelector(".stamp.nope");

  const down = e=>{
    dragging=true;
    const p = e.touches? e.touches[0] : e;
    startX=p.clientX; startY=p.clientY;
    card.style.transition="none";
  };
  const move = e=>{
    if(!dragging) return;
    const p = e.touches? e.touches[0] : e;
    dx=p.clientX-startX; dy=p.clientY-startY;
    const rot = dx/18;
    card.style.transform=`translate(${dx}px,${dy}px) rotate(${rot}deg)`;
    const t = Math.min(Math.abs(dx)/120, 1);
    like.style.opacity = dx>0 ? t : 0;
    nope.style.opacity = dx<0 ? t : 0;
  };
  const up = ()=>{
    if(!dragging) return;
    dragging=false;
    card.style.transition="transform .32s cubic-bezier(.22,1,.36,1)";
    if(dx>110){ fly(card, 1); }
    else if(dx<-110){ fly(card, -1); }
    else { card.style.transform=""; like.style.opacity=0; nope.style.opacity=0; }
    dx=0;dy=0;
  };
  card.addEventListener("mousedown",down);
  window.addEventListener("mousemove",move);
  window.addEventListener("mouseup",up);
  card.addEventListener("touchstart",down,{passive:true});
  card.addEventListener("touchmove",move,{passive:true});
  card.addEventListener("touchend",up);
}

function fly(card, dir){
  const id = +card.dataset.id;
  card.style.transform=`translate(${dir*600}px,${dir>0?-60:-40}px) rotate(${dir*30}deg)`;
  card.style.opacity="0";
  setTimeout(()=>{
    deck = deck.filter(x=>x!==id);
    history.push({id, action: dir>0?"like":"pass"});
    if(dir>0) match(id);
    render();
    updateUndo();
  }, 240);
}

/* programmatic buttons */
function topCard(){ const cards=deckEl.querySelectorAll(".card"); return cards[cards.length-1]; }
$("#passBtn").onclick = ()=>{ const c=topCard(); if(c){ c.style.transition="transform .32s cubic-bezier(.22,1,.36,1)"; fly(c,-1);} };
$("#likeBtn").onclick = ()=>{ const c=topCard(); if(c){ c.style.transition="transform .32s cubic-bezier(.22,1,.36,1)"; fly(c,1);} };

$("#undoBtn").onclick = ()=>{
  const last = history.pop();
  if(!last) return;
  deck.unshift(last.id);
  render(); updateUndo();
};
function updateUndo(){ $("#undoBtn").disabled = history.length===0; }

/* ---------- match -> save + open recipe (stays until closed) ---------- */
function match(id){
  if(!saved.includes(id)){ saved.unshift(id); storeSaved(saved); }
  updateBadge();
  openRecipe(id, true);
}
function updateBadge(){
  const b=$("#savedBadge");
  if(saved.length){ b.style.display="inline-flex"; b.textContent=saved.length; }
  else b.style.display="none";
}

/* ---------- sheet ---------- */
const scrim=$("#scrim"), sheet=$("#sheet"), sc=$("#sheetContent");
function openSheet(){ scrim.classList.add("open"); sheet.classList.add("open"); }
function closeSheet(){ scrim.classList.remove("open"); sheet.classList.remove("open"); }
scrim.onclick = closeSheet;

function openRecipe(id, fromMatch){
  const r=byId(id); const cat=CATS[r.cat];
  if(!checked[id]) checked[id]=new Set();
  const ings = r.ing.map((it,i)=>`
    <li class="${checked[id].has(i)?"done":""}" data-i="${i}">
      <span class="box"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></span>
      <span>${it}</span>
    </li>`).join("");
  const steps = r.steps.map(s=>`<li>${s}</li>`).join("");
  sc.innerHTML = `
    <div class="sheet-head">
      <button class="x" id="xBtn" aria-label="Kapat">✕</button>
      <span class="s-cat" style="background:linear-gradient(135deg,${cat.c1},${cat.c2})">${r.emoji} ${cat.label}</span>
      <h2>${r.name}</h2>
      <div class="s-meta">
        <span>⏱️ ${r.time}</span><span>🍽️ ${r.serv} kişi</span><span>🗓️ ${r.keeps} taze kalır</span>
      </div>
    </div>
    <div class="sheet-body">
      <div class="sec-label">🛒 Malzemeler</div>
      <ul class="ing" id="ingList">${ings}</ul>
      <div class="sec-label">👩‍🍳 Nasıl yapılır</div>
      <ol class="steps">${steps}</ol>
      <div class="note">💡<div><b>Saklama:</b> ${r.note}</div></div>
      ${fromMatch ? '<p class="stay-tag">Bu tarif sen kapatana kadar açık kalır. Listene de eklendi 💚</p>' : ''}
    </div>`;
  $("#xBtn").onclick = closeSheet;
  // ingredient checklist (shopping)
  sc.querySelectorAll("#ingList li").forEach(li=>{
    li.onclick=()=>{
      const i=+li.dataset.i;
      if(checked[id].has(i)){ checked[id].delete(i); li.classList.remove("done"); }
      else { checked[id].add(i); li.classList.add("done"); }
    };
  });
  openSheet();
}

/* ---------- saved list view ---------- */
$("#openSaved").onclick = ()=>{
  const rows = saved.map(id=>{
    const r=byId(id); const cat=CATS[r.cat];
    return `<div class="srow" data-id="${id}">
      <span class="sg">${r.emoji}</span>
      <div class="si"><h4>${r.name}</h4><p>${cat.label} · ⏱️ ${r.time} · 🗓️ ${r.keeps}</p></div>
      <button class="rm" data-rm="${id}" aria-label="Çıkar">✕</button>
    </div>`;
  }).join("");
  sc.innerHTML = `
    <div class="sheet-head">
      <button class="x" id="xBtn" aria-label="Kapat">✕</button>
      <span class="s-cat" style="background:linear-gradient(135deg,#3E7D4E,#2F6A40)">🍳 Mutfak listem</span>
      <h2>Eşleştiğin tarifler</h2>
      <div class="s-meta"><span>${saved.length} tarif kayıtlı</span></div>
    </div>
    <div class="sheet-body">
      ${saved.length ? `<div class="saved-list">${rows}</div>`
        : `<div class="list-empty"><div class="le-g">🥣</div>Henüz tarif eşleştirmedin.<br>Sağa kaydırdığın tarifler buraya düşer.</div>`}
    </div>`;
  $("#xBtn").onclick = closeSheet;
  sc.querySelectorAll(".srow").forEach(row=>{
    row.onclick = e=>{ if(e.target.dataset.rm!==undefined) return; openRecipe(+row.dataset.id, false); };
  });
  sc.querySelectorAll("[data-rm]").forEach(b=>{
    b.onclick = e=>{
      e.stopPropagation();
      const id=+b.getAttribute("data-rm");
      saved = saved.filter(x=>x!==id); storeSaved(saved); updateBadge();
      b.closest(".srow").remove();
    };
  });
  openSheet();
};

/* ---------- chips ---------- */
function buildChips(){
  const wrap=$("#chips"); wrap.innerHTML="";
  Object.keys(CATS).forEach(k=>{
    const c=document.createElement("button");
    c.className="chip"+(k===filter?" on":"");
    c.textContent = k==="all" ? "Hepsi" : (CATS[k].emoji||"")+CATS[k].label;
    c.onclick=()=>{ filter=k; buildChips(); buildDeck(); };
    wrap.appendChild(c);
  });
}

$("#reshuffle").onclick = buildDeck;

/* ---------- keyboard ---------- */
window.addEventListener("keydown", e=>{
  if(sheet.classList.contains("open")){ if(e.key==="Escape") closeSheet(); return; }
  if(e.key==="ArrowRight") $("#likeBtn").click();
  if(e.key==="ArrowLeft") $("#passBtn").click();
});

/* init */
buildChips();
buildDeck();
updateBadge();
</script>
</body>
</html>
